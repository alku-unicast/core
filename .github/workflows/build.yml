name: CD (Release UniCast)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            os: 'windows'
            arch: 'x86_64'
            args: ''
          - platform: 'ubuntu-20.04'
            os: 'linux'
            arch: 'x86_64'
            args: ''
          - platform: 'macos-13'
            os: 'macos'
            arch: 'x86_64'
            args: '--target x86_64-apple-darwin'
          - platform: 'macos-latest' # macOS 14 is Apple Silicon
            os: 'macos'
            arch: 'aarch64'
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'aarch64' && 'aarch64-apple-darwin' || (matrix.arch == 'x86_64' && matrix.os == 'macos' && 'x86_64-apple-darwin' || '') }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
          # Install GStreamer for development headers
          sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install dependencies (macOS only)
        if: matrix.os == 'macos'
        run: |
          # No extra OS deps needed for Tauri core on macOS

      - name: Frontend Build
        run: |
          npm install
          npm run build

      - name: Build Application (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action automatically replaces this
          releaseName: 'UniCast v__VERSION__'
          releaseBody: 'UniCast Cross-Platform Release for ${{ matrix.os }} (${{ matrix.arch }})'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unicast-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            app/src-tauri/target/release/bundle/msi/*.msi
            app/src-tauri/target/release/bundle/dmg/*.dmg
            app/src-tauri/target/release/bundle/appimage/*.AppImage
            app/src-tauri/target/release/bundle/deb/*.deb
